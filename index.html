<h2 id="简单爬虫"><a href="#简单爬虫" class="headerlink" title="简单爬虫"></a>简单爬虫</h2><figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;github.com/PuerkitoBio/goquery&quot;</span></span><br><span class="line">	<span class="string">&quot;net/http&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">//查询广东最新疫情</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	d := findEle(<span class="string">&quot;http://wsjkw.gd.gov.cn/&quot;</span>)</span><br><span class="line">	newlest := d.Find(<span class="string">&quot;#tab &gt; div:nth-child(5) &gt; ul &gt; li:nth-child(1) &gt; a&quot;</span>)</span><br><span class="line">	href, _ := newlest.Attr(<span class="string">&quot;href&quot;</span>)</span><br><span class="line">	fmt.Println(href)</span><br><span class="line"></span><br><span class="line">	detail := findEle(href)</span><br><span class="line">	content := detail.Find(<span class="string">&quot;body &gt; div.main-content &gt; div &gt; div &gt; div &gt; div &gt; div.content-content&quot;</span>)</span><br><span class="line">	fmt.Println(newlest.Text())</span><br><span class="line">	fmt.Println(content.Text())</span><br><span class="line"></span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">findEle</span><span class="params">(url <span class="type">string</span>)</span></span> *goquery.Document &#123;</span><br><span class="line">	res, _ := http.Get(url)</span><br><span class="line">	d, _ := goquery.NewDocumentFromReader(res.Body)</span><br><span class="line">	<span class="keyword">return</span> d</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="追加写入csv"><a href="#追加写入csv" class="headerlink" title="追加写入csv"></a>追加写入csv</h2><figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;encoding/csv&quot;</span></span><br><span class="line">	<span class="string">&quot;io&quot;</span></span><br><span class="line">	<span class="string">&quot;os&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	f, _ := os.OpenFile(<span class="string">&quot;test.csv&quot;</span>, os.O_RDWR|os.O_CREATE, <span class="number">0666</span>)</span><br><span class="line">	<span class="keyword">defer</span> f.Close()</span><br><span class="line">	f.WriteString(<span class="string">&quot;\xEF\xBB\xBF&quot;</span>) <span class="comment">//写入utf-8 编码</span></span><br><span class="line">	f.Seek(<span class="number">0</span>, io.SeekEnd)</span><br><span class="line">	w := csv.NewWriter(f)</span><br><span class="line">	w.Write([]<span class="type">string</span>&#123;<span class="string">&quot;网站&quot;</span>, <span class="string">&quot;类型&quot;</span>&#125;)</span><br><span class="line">	w.Write([]<span class="type">string</span>&#123;<span class="string">&quot;知乎&quot;</span>, <span class="string">&quot;问答类&quot;</span>&#125;)</span><br><span class="line">	w.Write([]<span class="type">string</span>&#123;<span class="string">&quot;百度&quot;</span>, <span class="string">&quot;搜索类&quot;</span>&#125;)</span><br><span class="line">	w.Write([]<span class="type">string</span>&#123;<span class="string">&quot;B站&quot;</span>, <span class="string">&quot;视频类&quot;</span>&#125;)</span><br><span class="line">	w.Flush()</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="读取excel：格式化输出接口文档"><a href="#读取excel：格式化输出接口文档" class="headerlink" title="读取excel：格式化输出接口文档"></a>读取excel：格式化输出接口文档</h2><figure class="highlight go"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">package</span> main</span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> (</span><br><span class="line">	<span class="string">&quot;fmt&quot;</span></span><br><span class="line">	<span class="string">&quot;github.com/360EntSecGroup-Skylar/excelize&quot;</span></span><br><span class="line">	<span class="string">&quot;regexp&quot;</span></span><br><span class="line">	<span class="string">&quot;sort&quot;</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="comment">//格式化输出接口文档</span></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">main</span><span class="params">()</span></span> &#123;</span><br><span class="line">	f, _ := excelize.OpenFile(<span class="string">&quot;a.xlsx&quot;</span>)</span><br><span class="line">	<span class="comment">//序号	参数名称	变量名	参数类型	必填	描述</span></span><br><span class="line">	<span class="comment">//1	交易流水号	tranSeq	String(20)	是	发起系统的流水或业务流水号</span></span><br><span class="line">	<span class="comment">//										业务号</span></span><br><span class="line">	rows := f.GetRows(<span class="string">&quot;Sheet1&quot;</span>)</span><br><span class="line">	m := <span class="keyword">map</span>[<span class="type">string</span>]<span class="type">string</span>&#123;&#125; <span class="comment">//&#123;&quot;tranSeq&quot;:&quot;[必填]交易流水号：发起系统的流水或业务流水号、运单号&quot;&#125;</span></span><br><span class="line">	<span class="keyword">var</span> k <span class="type">string</span></span><br><span class="line">	re, _ := regexp.Compile(<span class="string">&quot;\\s+&quot;</span>)</span><br><span class="line">	<span class="keyword">for</span> i, row := <span class="keyword">range</span> rows &#123;</span><br><span class="line">		<span class="keyword">var</span> fieldZh = row[<span class="number">1</span>]</span><br><span class="line">		<span class="keyword">var</span> field = row[<span class="number">2</span>]</span><br><span class="line">		<span class="keyword">var</span> mustWrite = row[<span class="number">4</span>]</span><br><span class="line">		<span class="keyword">var</span> comment = row[<span class="number">5</span>]</span><br><span class="line">		comment = re.ReplaceAllString(comment, <span class="string">&quot;&quot;</span>)</span><br><span class="line">		<span class="comment">//跳过首行</span></span><br><span class="line">		<span class="keyword">if</span> i &lt; <span class="number">1</span> &#123;</span><br><span class="line">			<span class="keyword">continue</span></span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">if</span> <span class="built_in">len</span>(field) &gt; <span class="number">0</span> &#123;</span><br><span class="line">			k = field</span><br><span class="line">			<span class="keyword">if</span> mustWrite == <span class="string">&quot;是&quot;</span> &#123;</span><br><span class="line">				mustWrite = <span class="string">&quot;[必填]&quot;</span></span><br><span class="line">			&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">				mustWrite = <span class="string">&quot;&quot;</span></span><br><span class="line">			&#125;</span><br><span class="line">			m[k] = fmt.Sprintf(<span class="string">&quot;%s%s:%s&quot;</span>, mustWrite, fieldZh, comment)</span><br><span class="line">		&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">			<span class="comment">//合并单元格时记录上次结果</span></span><br><span class="line">			m[k] = m[k] + <span class="string">&quot;、&quot;</span> + comment</span><br><span class="line">		&#125;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//按字母序对map的key排序</span></span><br><span class="line">	sorted_keys := <span class="built_in">make</span>([]<span class="type">string</span>, <span class="number">0</span>)</span><br><span class="line">	<span class="keyword">for</span> k, _ := <span class="keyword">range</span> m &#123;</span><br><span class="line">		sorted_keys = <span class="built_in">append</span>(sorted_keys, k)</span><br><span class="line">	&#125;</span><br><span class="line">	sort.Strings(sorted_keys)</span><br><span class="line">	<span class="keyword">for</span> _, s := <span class="keyword">range</span> sorted_keys &#123;</span><br><span class="line">		<span class="comment">//fmt.Println(fmt.Sprintf(&quot;o.put(\&quot;%s\&quot;, \&quot;\&quot;);//%s&quot;, s, m[s]))</span></span><br><span class="line">		fmt.Print(fmt.Sprintf(<span class="string">&quot;.fluentPut(\&quot;%s\&quot;, \&quot;\&quot;)//%s\n&quot;</span>, s, m[s]))</span><br><span class="line"></span><br><span class="line">		<span class="comment">//required := false</span></span><br><span class="line">		<span class="comment">//if strings.Contains(m[s], &quot;[必填]&quot;) &#123;</span></span><br><span class="line">		<span class="comment">//	required = true</span></span><br><span class="line">		<span class="comment">//	m[s] = m[s][8:]</span></span><br><span class="line">		<span class="comment">//&#125;</span></span><br><span class="line">		<span class="comment">//fmt.Print(fmt.Sprintf(&quot;@ApiModelProperty(value = \&quot;%s\&quot;, required = %v)\nprivate String %s;\n&quot;, m[s], required, s))</span></span><br><span class="line">	&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
